syntax = "proto3";

package tribecart.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/tribecart/proto/tribecart/v1;v1";

// Order status enumeration
enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_PROCESSING = 2;
  ORDER_STATUS_SHIPPED = 3;
  ORDER_STATUS_DELIVERED = 4;
  ORDER_STATUS_CANCELLED = 5;
  ORDER_STATUS_REFUNDED = 6;
  ORDER_STATUS_FAILED = 7;
}

// Payment method enumeration
enum PaymentMethod {
  PAYMENT_METHOD_UNSPECIFIED = 0;
  PAYMENT_METHOD_CREDIT_CARD = 1;
  PAYMENT_METHOD_DEBIT_CARD = 2;
  PAYMENT_METHOD_NET_BANKING = 3;
  PAYMENT_METHOD_UPI = 4;
  PAYMENT_METHOD_COD = 5;
}

// Order item represents a single product in an order
message OrderItem {
  string product_id = 1;
  string name = 2;
  int32 quantity = 3;
  double unit_price = 4;
  double discount = 5;
  double tax = 6;
  double total_price = 7;
  string sku = 8;
  string image_url = 9;
}

// Shipping address for the order
message ShippingAddress {
  string id = 1;
  string full_name = 2;
  string address_line1 = 3;
  string address_line2 = 4;
  string city = 5;
  string state = 6;
  string country = 7;
  string postal_code = 8;
  string phone_number = 9;
  bool is_default = 10;
}

// Order represents a complete order in the system
message Order {
  string id = 1;
  string user_id = 2;
  string order_number = 3;
  repeated OrderItem items = 4;
  double subtotal = 5;
  double shipping_cost = 6;
  double tax_amount = 7;
  double discount_amount = 8;
  double total_amount = 9;
  OrderStatus status = 10;
  PaymentMethod payment_method = 11;
  string payment_id = 12;
  string shipping_address_id = 13;
  ShippingAddress shipping_address = 14;
  string tracking_number = 15;
  string carrier = 16;
  google.protobuf.Timestamp ordered_at = 17;
  google.protobuf.Timestamp shipped_at = 18;
  google.protobuf.Timestamp delivered_at = 19;
  google.protobuf.Timestamp cancelled_at = 20;
  string cancellation_reason = 21;
  map<string, string> metadata = 22;
  google.protobuf.Timestamp created_at = 23;
  google.protobuf.Timestamp updated_at = 24;
}

// OrderService handles order-related operations
service OrderService {
  // Create a new order
  rpc CreateOrder(CreateOrderRequest) returns (Order);
  
  // Get an order by ID
  rpc GetOrder(GetOrderRequest) returns (Order);
  
  // List orders with optional filters
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  
  // Update order status
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (Order);
  
  // Cancel an order
  rpc CancelOrder(CancelOrderRequest) returns (google.protobuf.Empty);
  
  // Get order history for a user
  rpc GetOrderHistory(GetOrderHistoryRequest) returns (ListOrdersResponse);
}

// Request to create a new order
message CreateOrderRequest {
  string user_id = 1;
  repeated OrderItem items = 2;
  string shipping_address_id = 3;
  PaymentMethod payment_method = 4;
  string payment_id = 5;
  string coupon_code = 6;
  string notes = 7;
}

// Request to get an order by ID
message GetOrderRequest {
  string id = 1;
  bool include_items = 2;
  bool include_address = 3;
}

// Request to list orders with filters
message ListOrdersRequest {
  int32 page_size = 1;
  string page_token = 2;
  string user_id = 3;
  OrderStatus status = 4;
  google.protobuf.Timestamp from_date = 5;
  google.protobuf.Timestamp to_date = 6;
  string order_by = 7;
  bool desc = 8;
}

// Response for listing orders
message ListOrdersResponse {
  repeated Order orders = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

// Request to update order status
message UpdateOrderStatusRequest {
  string id = 1;
  OrderStatus status = 2;
  string notes = 3;
  string tracking_number = 4;
  string carrier = 5;
}

// Request to cancel an order
message CancelOrderRequest {
  string id = 1;
  string reason = 2;
  bool refund_payment = 3;
}

// Request to get order history for a user
message GetOrderHistoryRequest {
  string user_id = 1;
  int32 page_size = 2;
  string page_token = 3;
  OrderStatus status = 4;
  google.protobuf.Timestamp from_date = 5;
  google.protobuf.Timestamp to_date = 6;
}